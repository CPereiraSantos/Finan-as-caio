<!DOCTYPE html>

</head>

        <h1>Controle de Gastos Pessoais</h1>
        
        <div id="cards" class="cards">
            <div class="card">
                <h3>Total em Despesas</h3>
                <p id="total-gasto" style="color: #ef4444">R$ 0,00</p>
            </div>
            <div class="card">
                <h3>Total Pago</h3>

            </div>
            <div class="card">
                <h3>Pendente</h3>
                <p id="total-pendente" style="color: #f59e0b">R$ 0,00</p>
            </div>
        </div>

        <div id="conteudo">
            <p>Carregando dados da planilha...</p>
        </div>
    </div>
    <script src="script.js"></script>
