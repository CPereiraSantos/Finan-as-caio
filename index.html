<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Minhas Finanças 💎</h1>
            <p>Controle pessoal de gastos e rendimentos</p>
        </header>

        <section class="cards">
            <div class="card glass">
                <span>Saldo Total</span>
                <h2 id="total-geral">R$ 0,00</h2>
            </div>
            <div class="card glass">
                <span>Pago</span>
                <h2 id="total-pago" class="text-green">R$ 0,00</h2>
            </div>
            <div class="card glass">
                <span>Pendente</span>
                <h2 id="total-pendente" class="text-orange">R$ 0,00</h2>
            </div>
        </section>

        <section class="form-box glass">
            <h3>➕ Novo Lançamento</h3>
            <form id="form-gasto">
                <div class="input-group">
                    <input type="text" id="desc" placeholder="Descrição" required>
                    <input type="number" id="valor" placeholder="Valor" step="0.01" required>
                    <input type="date" id="data" required>
                    <button type="submit" id="btn-salvar">Adicionar</button>
                </div>
            </form>
        </section>

        <section class="lista-container glass">
            <div id="conteudo">
                <p>Sincronizando dados...</p>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
