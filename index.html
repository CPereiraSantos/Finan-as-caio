<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Minhas Finanças 💎</h1>
            <p>Controle simplificado de saldo e despesas</p>
        </header>

        <section class="saldo-input-box glass">
            <div class="input-group-saldo">
                <div class="field">
                    <span>💰 Seu Saldo Atual</span>
                    <input type="number" id="saldo-disponivel" placeholder="R$ 0,00" step="0.01" oninput="calcularRestante()">
                </div>
                <div class="field result-field">
                    <span>📉 Saldo Restante (Após despesas)</span>
                    <h2 id="saldo-restante">R$ 0,00</h2>
                </div>
            </div>
        </section>

        <section class="cards">
            <div class="card glass">
                <span>Total em Despesas</span>
                <h2 id="total-geral">R$ 0,00</h2>
            </div>
        </section>

        <section class="form-box glass">
            <h3>➕ Nova Despesa</h3>
            <form id="form-gasto">
                <div class="input-group">
                    <input type="text" id="desc" placeholder="Descrição" required>
                    <input type="number" id="valor" placeholder="Valor" step="0.01" required>
                    <input type="date" id="data" required>
                    <button type="submit" id="btn-salvar">Adicionar</button>
                </div>
            </form>
        </section>

        <section class="lista-container glass">
            <div id="conteudo">
                <p>Sincronizando dados...</p>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
